<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampaignIQ — Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    input[type=range] { -webkit-appearance:none; width:100%; height:4px; background:#E2E8F0; border-radius:2px; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#0F172A; cursor:pointer; border:2px solid #F8FAFC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── existing data ─────────────────────────────────────── */
    const COMMENTS = [
      { id: 1, user: "@slowfashionera · 3m ago", text: '"SHEIN doing a Halloween campaign is giving landfill cosplay. Hard no. 🙄"', type: "negative" },
      { id: 2, user: "@thriftqueen99 · 7m ago", text: '"Fast fashion + Halloween = the scariest thing I\'ve seen all October."', type: "negative" },
      { id: 3, user: "@eco.not.ego · 14m ago", text: '"Spook-tacular deals on clothes that fall apart after one wear. Very on brand."', type: "negative" },
      { id: 4, user: "@halloweenjunkie · 21m ago", text: '"ok but are the deals actually good or is this just hype? asking for my wallet 👻"', type: "neutral" },
      { id: 5, user: "@fashionwatchdog · 29m ago", text: '"No labor disclosures, no material info. Just vibes and pumpkins. Pass."', type: "negative" },
    ];

    const SEGMENTS = [
      { id: 1, icon: "🧑‍💻", iconBg: "#FEF9C3", name: "Gen Z", pct: 42, level: "low", reaction: 'Skeptical about authenticity — "Sounds like every other brand."', fix: "Use transparent sourcing language with real numbers and third-party verification." },
      { id: 2, icon: "👨‍👩‍👧", iconBg: "#E0F2FE", name: "Parents", pct: 65, level: "mid", reaction: "Price sensitivity — sustainable often reads as expensive.", fix: "Emphasize long-term value and cost-per-use comparisons in the copy." },
      { id: 3, icon: "🌿", iconBg: "#DCFCE7", name: "Sustainability Advocates", pct: 30, level: "low", reaction: "No proof — vague claims trigger high skepticism in this segment.", fix: "Add data, certifications, and supply-chain breakdown directly in the campaign." },
    ];

    function useCountdown(start) {
      const [secs, setSecs] = useState(start);
      useEffect(() => {
        const t = setInterval(() => setSecs(s => (s > 0 ? s - 1 : 0)), 1000);
        return () => clearInterval(t);
      }, []);
      const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
      return [h, m, s].map(n => String(n).padStart(2, "0"));
    }

    const S = {
      blue: "#2563EB", blueLight: "#3B82F6", bluePale: "#EFF6FF",
      red: "#EF4444", redPale: "#FEF2F2",
      green: "#10B981", greenPale: "#ECFDF5", amber: "#F59E0B",
      g50: "#F8FAFC", g100: "#F1F5F9", g200: "#E2E8F0",
      g400: "#94A3B8", g500: "#64748B", g700: "#334155", g900: "#0F172A",
    };

    const PLAN_FIELDS = [
      { key: "name", label: "Program Name", placeholder: "2024 SHEIN Halloween Deals" },
      { key: "timeline", label: "Campaign Timeline", placeholder: "2024/9/16 – 2024/10/31" },
      { key: "message", label: "Key Message", placeholder: "Spook-Tacular Deals Are Ready to Take Over Your Halloween — Shop at SHEIN with Amazing Offers" },
      { key: "hashtag", label: "Hashtag", placeholder: "#SHEINHalloweenDeals" },
      { key: "slogan", label: "Slogan", placeholder: "e.g. Slay the Season" },
    ];

    const PERSONAS_STATIC = [
      { id: 0, icon: "✨", label: "Gen Z Fashion Lovers", iconBg: "#FEF9C3", emotion: "Excited but skeptical", emotionColor: "#92400E", emotionBg: "#FFFBEB", objection: '"Is this brand actually cool or just trend-chasing?"', comment: '"ok the aesthetic is giving but idk if I trust them lol 💀"', risk: "MEDIUM", riskColor: "#F59E0B", riskBg: "#FFFBEB", riskBar: 52 },
      { id: 1, icon: "🌿", label: "Eco-Conscious Consumers", iconBg: "#DCFCE7", emotion: "Distrustful", emotionColor: "#991B1B", emotionBg: "#FEF2F2", objection: '"Fast fashion + Halloween = maximum landfill energy."', comment: '"No sustainability report, no third-party audit. Hard pass."', risk: "HIGH", riskColor: "#EF4444", riskBg: "#FEF2F2", riskBar: 88 },
      { id: 2, icon: "🤨", label: "Sustainability Skeptics", iconBg: "#E0E7FF", emotion: "Indifferent", emotionColor: "#4338CA", emotionBg: "#EEF2FF", objection: '"Every brand does a Halloween sale. So what?"', comment: '"Cool deals I guess, but nothing here makes me switch from my usual."', risk: "LOW", riskColor: "#10B981", riskBg: "#ECFDF5", riskBar: 22 },
      { id: 3, icon: "💸", label: "Price-Sensitive Shoppers", iconBg: "#E0F2FE", emotion: "Curious & motivated", emotionColor: "#0369A1", emotionBg: "#E0F2FE", objection: '"How deep are the discounts really?"', comment: '"If the deals are actually good I\'m buying 5 things tonight 🛒"', risk: "LOW", riskColor: "#10B981", riskBg: "#ECFDF5", riskBar: 18 },
    ];

    /* ─── focus group constants ─────────────────────────────── */
    const FG_INTERESTS = ["Fashion","Tech","Gaming","Fitness","Cooking","Travel","Music","Art","Sports","Beauty","Parenting","Film"];
    const FG_VALUES    = ["Sustainability","Luxury","Convenience","Authenticity","Community","Innovation","Health","Status","Creativity","Equality"];
    const FG_TRAITS    = ["Skeptical","Trend-driven","Analytical","Impulsive","Practical","Bold","Empathetic","Cynical","Optimistic","Brand-loyal"];
    const FG_MEDIA     = ["TikTok","Instagram","YouTube","Twitter/X","LinkedIn","Facebook","TV","Podcasts","Reddit","Twitch"];
    const AVATAR_BG    = ["#FEF9C3","#E0F2FE","#DCFCE7","#E0E7FF","#FEE2E2","#F3E8FF","#FFF7ED","#ECFDF5"];
    const AVATAR_EM    = ["👩","👨","🧑","👩🏽","👨🏾","🧑🏻","👩🏿","👨🏼"];

    function TagPicker({ options, selected, onChange }) {
      const toggle = o => onChange(selected.includes(o) ? selected.filter(s => s !== o) : [...selected, o]);
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {options.map(o => (
            <span key={o} onClick={() => toggle(o)} style={{
              padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: "pointer",
              border: `1.5px solid ${selected.includes(o) ? S.g900 : S.g200}`,
              background: selected.includes(o) ? S.g900 : "transparent",
              color: selected.includes(o) ? "#fff" : S.g500,
              transition: "all .15s",
            }}>{o}</span>
          ))}
        </div>
      );
    }

    /* ─── Screen 3 (Simulate) ───────────────────────────────── */
    function Screen3({ S, simulating, showResults, showSegments, showAnalysis, showNextBtn, runSimulation, fillColor, goTo }) {
      const [plan, setPlan] = useState({ name: "2024 SHEIN Halloween Deals", timeline: "2024/9/16 – 2024/10/31", message: "Spook-Tacular Deals Are Ready to Take Over Your Halloween — Shop at SHEIN with Amazing Offers", hashtag: "#SHEINHalloweenDeals", slogan: "Slay the Season" });
      const [activePersona, setActivePersona] = useState(0);
      const inputStyle = { width: "100%", border: `1.5px solid ${S.g200}`, borderRadius: 8, padding: "10px 13px", fontFamily: "system-ui, sans-serif", fontSize: 14, color: S.g900, lineHeight: 1.5, background: S.g50, outline: "none" };
      const persona = PERSONAS_STATIC[activePersona];
      return (
        <div style={{ background: S.g50, minHeight: "calc(100vh - 56px)" }}>
          <div style={{ maxWidth: 1020, margin: "0 auto", padding: "48px 28px" }} className="fadeIn">
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: ".1em", textTransform: "uppercase", color: S.blue, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 6, height: 6, background: S.blue, borderRadius: "50%", display: "inline-block", animation: "blink 1.4s ease-in-out infinite" }} />AI Pre-Testing Engine
              </div>
              <h2 style={{ fontFamily: "Georgia, serif", fontSize: 34, fontWeight: 800, marginBottom: 8 }}>Simulate Before You Launch</h2>
              <p style={{ fontSize: 15, color: S.g500 }}>Fill in your campaign plan below. Our engine stress-tests it across real audience segments in seconds.</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 24, marginBottom: 24, alignItems: "start" }}>
              <div style={{ background: "#fff", border: `1.5px solid ${S.g200}`, borderRadius: 16, padding: 28, boxShadow: "0 2px 8px rgba(0,0,0,.04)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: S.g700, marginBottom: 20, textTransform: "uppercase", letterSpacing: ".07em" }}>Campaign Plan</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {PLAN_FIELDS.map(f => (
                    <div key={f.key}>
                      <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: S.g500, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 6 }}>{f.label}</label>
                      {f.key === "message"
                        ? <textarea rows={3} value={plan[f.key]} onChange={e => setPlan(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.placeholder} style={{ ...inputStyle, resize: "none" }} />
                        : <input type="text" value={plan[f.key]} onChange={e => setPlan(p => ({ ...p, [f.key]: e.target.value }))} placeholder={f.placeholder} style={inputStyle} />}
                    </div>
                  ))}
                </div>
                <button onClick={runSimulation} disabled={simulating} style={{ marginTop: 22, background: simulating ? S.g400 : S.blue, color: "#fff", border: "none", padding: "13px 26px", borderRadius: 10, fontFamily: "system-ui, sans-serif", fontSize: 15, fontWeight: 600, cursor: simulating ? "default" : "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                  {simulating ? <><span>Simulating </span><span className="dot1" style={{ display: "inline-block" }}>●</span><span className="dot2" style={{ display: "inline-block" }}>●</span><span className="dot3" style={{ display: "inline-block" }}>●</span></> : "⚡ Simulate Audience Reaction"}
                </button>
              </div>
              <div style={{ background: "#fff", border: `1.5px solid ${S.g200}`, borderRadius: 16, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,.04)" }}>
                <div style={{ padding: "16px 20px", borderBottom: `1px solid ${S.g100}` }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: S.g500, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 12 }}>Persona Reactions</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {PERSONAS_STATIC.map((p, i) => (
                      <button key={p.id} onClick={() => setActivePersona(i)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left", background: activePersona === i ? S.bluePale : "transparent", borderLeft: activePersona === i ? `3px solid ${S.blue}` : "3px solid transparent", transition: "all .15s" }}>
                        <div style={{ width: 28, height: 28, borderRadius: 7, background: p.iconBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{p.icon}</div>
                        <span style={{ fontSize: 13, fontWeight: activePersona === i ? 600 : 400, color: activePersona === i ? S.blue : S.g700 }}>{p.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{ padding: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: persona.iconBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{persona.icon}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: S.g900 }}>{persona.label}</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    <div><div style={{ fontSize: 10, fontWeight: 600, color: S.g400, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 5 }}>Emotional Reaction</div><span style={{ fontSize: 12, fontWeight: 600, padding: "4px 12px", borderRadius: 20, background: persona.emotionBg, color: persona.emotionColor }}>{persona.emotion}</span></div>
                    <div><div style={{ fontSize: 10, fontWeight: 600, color: S.g400, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 5 }}>Top Objection</div><div style={{ fontSize: 13, color: S.g700, lineHeight: 1.5, fontStyle: "italic" }}>{persona.objection}</div></div>
                    <div><div style={{ fontSize: 10, fontWeight: 600, color: S.g400, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 5 }}>Sample Comment</div><div style={{ background: S.g50, borderRadius: 8, padding: "10px 12px", fontSize: 13, color: S.g700, lineHeight: 1.5 }}>{persona.comment}</div></div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 600, color: S.g400, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 6 }}>Backlash Risk</div>
                      <div style={{ height: 6, background: S.g100, borderRadius: 4, overflow: "hidden", marginBottom: 5 }}><div style={{ height: "100%", borderRadius: 4, background: persona.riskColor, width: `${persona.riskBar}%`, transition: "width .6s ease" }} /></div>
                      <span style={{ fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 20, background: persona.riskBg, color: persona.riskColor, letterSpacing: ".06em" }}>{persona.risk}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            {showResults && (
              <div className="fadeIn">
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 20 }}>
                  {SEGMENTS.map((seg, i) => (
                    <div key={seg.id} style={{ background: "#fff", border: `1.5px solid ${S.g200}`, borderRadius: 14, padding: 22, opacity: showSegments.includes(i) ? 1 : 0, transform: showSegments.includes(i) ? "translateY(0)" : "translateY(16px)", transition: "all .4s" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}><div style={{ width: 36, height: 36, borderRadius: 10, background: seg.iconBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{seg.icon}</div><div style={{ fontSize: 14, fontWeight: 600 }}>{seg.name}</div></div>
                      <div style={{ fontSize: 11, fontWeight: 500, color: S.g400, textTransform: "uppercase", letterSpacing: ".07em", marginBottom: 6 }}>Sentiment</div>
                      <div style={{ height: 6, background: S.g100, borderRadius: 4, overflow: "hidden", marginBottom: 4 }}><div style={{ height: "100%", borderRadius: 4, background: fillColor(seg.level), width: `${seg.pct}%`, transition: "width 1s ease" }} /></div>
                      <div style={{ fontFamily: "Georgia, serif", fontSize: 22, fontWeight: 800, marginBottom: 14 }}>{seg.pct}% positive</div>
                      <div style={{ background: S.g50, borderRadius: 8, padding: "10px 12px", fontSize: 12, color: S.g700, marginBottom: 10, lineHeight: 1.5 }}>⚡ <strong>Top Reaction:</strong> {seg.reaction}</div>
                      <div style={{ background: S.bluePale, borderRadius: 8, padding: "10px 12px", fontSize: 12, color: S.blue, fontWeight: 500, lineHeight: 1.5 }}>→ {seg.fix}</div>
                    </div>
                  ))}
                </div>
                {showAnalysis && (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }} className="fadeIn">
                    <div style={{ background: "#fff", border: `1.5px solid ${S.g200}`, borderRadius: 14, padding: 22 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: S.g500, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 16 }}>Emotional Tone Analysis</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                        {[{ label: "Hype-driven", color: "#92400E", bg: "#FFFBEB" }, { label: "Superficial", color: "#991B1B", bg: "#FEF2F2" }, { label: "Commercial", color: S.g700, bg: S.g100 }, { label: "Unverified", color: "#991B1B", bg: "#FEF2F2" }].map(t => (
                          <span key={t.label} style={{ padding: "6px 14px", borderRadius: 20, fontSize: 12, fontWeight: 500, background: t.bg, color: t.color }}>{t.label}</span>
                        ))}
                      </div>
                      <p style={{ fontSize: 13, color: S.g500, lineHeight: 1.6 }}>The campaign leans heavily on hype without substance. Eco-conscious and informed shoppers are likely to disengage or push back.</p>
                    </div>
                    <div style={{ background: "#fff", border: `1.5px solid ${S.g200}`, borderRadius: 14, padding: 22 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: S.g500, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 16 }}>Backlash Risk Meter</div>
                      <div style={{ height: 10, background: S.g100, borderRadius: 6, overflow: "hidden", marginBottom: 10 }}><div style={{ height: "100%", background: `linear-gradient(90deg,${S.green},${S.amber},${S.red})`, width: "100%", borderRadius: 6 }} /></div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: S.g400, fontWeight: 500 }}><span>Low</span><span>Medium</span><span>High</span></div>
                      <div style={{ fontFamily: "Georgia, serif", fontSize: 20, fontWeight: 800, color: S.red, marginTop: 14 }}>⬤ HIGH RISK</div>
                      <p style={{ fontSize: 13, color: S.g500, marginTop: 10, lineHeight: 1.6 }}>Apply the suggested fixes to drop risk from HIGH → MEDIUM or lower.</p>
                    </div>
                  </div>
                )}
                {showNextBtn && (
                  <button onClick={() => goTo(4)} className="fadeIn" style={{ background: S.blue, color: "#fff", border: "none", padding: "15px 30px", borderRadius: 12, fontFamily: "Georgia, serif", fontSize: 16, fontWeight: 700, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8 }}>See the Improved Campaign ✦</button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ─── Screen 5: AI Focus Group (Hardcoded Mock) ─────────── */
    const MOCK_PERSONAS = [
      { name: "Zoe Chen", age: 22, job: "Fashion TikToker", summary: "I buy based on vibes, but I cancel based on values — and I have 40k followers watching both.", traits: ["Trend-driven", "Vocal", "Brand-skeptical"], motivations: "Wants to look good on a budget without feeling guilty about it. Follows sustainability creators alongside fast fashion hauls.", sentimentScore: 44 },
      { name: "Marcus Webb", age: 29, job: "Sustainability Consultant", summary: "I don't expect brands like this to be perfect, but I do expect them to stop pretending.", traits: ["Analytical", "Cynical", "Principled"], motivations: "Holds brands accountable publicly. Has written threads about greenwashing that went viral. Won't buy from SHEIN but his opinion shapes others'.", sentimentScore: 18 },
      { name: "Priya Nair", age: 26, job: "Grad Student", summary: "Look, I know fast fashion is bad, but rent is $1,800 a month and Halloween is one night.", traits: ["Practical", "Price-sensitive", "Pragmatic"], motivations: "Balances ethical ideals with a tight budget. Will rationalize a purchase she likes. The swing voter of this focus group.", sentimentScore: 67 },
      { name: "Devon Park", age: 31, job: "Creative Director", summary: "The creative is fine. The problem is the brand has zero credibility to pull off a fun-and-carefree tone right now.", traits: ["Aesthetic-driven", "Strategic", "Skeptical"], motivations: "Evaluates campaigns professionally. Cares about craft and consistency. Can separate personal ethics from marketing critique.", sentimentScore: 38 },
    ];

    const MOCK_TRANSCRIPT = [
      { type: "moderator", speaker: "Moderator", text: "Thanks everyone for joining. We're looking at SHEIN's 2024 Halloween campaign — 'Spook-Tacular Deals Are Ready to Take Over Your Halloween.' Take a moment to react. First impressions only." },
      { type: "persona", speaker: "Zoe Chen", text: "Okay so the aesthetic is actually giving a little? Like the dark purple banner, the pumpkin — it's cute. But the second I see SHEIN my brain just goes... oh. This again." },
      { type: "persona", speaker: "Priya Nair", text: "I mean I actually clicked through? I'm not gonna lie. I need a Halloween outfit and I'm not spending $80 on something I'll wear once. The deals are real." },
      { type: "persona", speaker: "Marcus Webb", text: "The deals are real, yeah. So is the landfill. We're talking about a company that produces thousands of new items daily encouraging people to buy disposable costumes. There is no version of this campaign that isn't a problem for me." },
      { type: "persona", speaker: "Devon Park", text: "From a pure craft standpoint — 'Spook-Tacular' is doing a lot of heavy lifting. It's the whole idea. There's nothing underneath it. No story, no hook, no reason to care beyond 'it's cheap and it's Halloween.'" },
      { type: "moderator", speaker: "Moderator", text: "Zoe, you mentioned the aesthetic worked for you initially — what changed when you saw the brand?" },
      { type: "persona", speaker: "Zoe Chen", text: "It's the trust thing. Like I've seen the warehouse videos. I've seen the quality complaints. So even if the banner looks good, I'm already mentally writing the comment about how it falls apart after one wear. Which — I would post that. That's content." },
      { type: "persona", speaker: "Priya Nair", text: "I think you're all being a bit much though? It's Halloween. It's supposed to be cheap and fun. Not every purchase needs to be a political statement." },
      { type: "persona", speaker: "Marcus Webb", text: "Priya I hear you, genuinely. But the campaign isn't just targeting you — it's reaching people who don't have the context, and it's normalizing this as just... fun seasonal shopping. That's what I find irresponsible." },
      { type: "persona", speaker: "Devon Park", text: "What would actually work here is if they leaned into the price point as the feature, not the vibe. Like — 'Real costume, real price, no regrets.' That's honest. That's something. Right now it's trying to be aspirational and that's just not believable from this brand." },
      { type: "persona", speaker: "Zoe Chen", text: "Okay Devon that's actually good. If they just owned what they are instead of trying to compete with brands that have actual aesthetic credibility — I might respect it more. Maybe not buy it but like... respect it." },
      { type: "moderator", speaker: "Moderator", text: "Would any of you share this campaign? Click through? Buy something?" },
      { type: "persona", speaker: "Priya Nair", text: "I'd buy something. Already said that. Not proud of it but yes." },
      { type: "persona", speaker: "Zoe Chen", text: "I wouldn't share it positively. But I'd probably stitch it. Which is technically more reach for them so — you're welcome SHEIN I guess?" },
      { type: "persona", speaker: "Marcus Webb", text: "I'd quote-tweet it with a thread about fast fashion Halloween waste. So they'd be getting reach from me too, just not the kind they want." },
      { type: "persona", speaker: "Devon Park", text: "I wouldn't engage at all. It's not interesting enough to critique professionally and it's not good enough to endorse. It just exists." },
      { type: "moderator", speaker: "Moderator", text: "Last question — what would make this campaign better?" },
      { type: "persona", speaker: "Priya Nair", text: "Just show me the actual deals clearly. Price comparisons. What I'm getting. Stop with the hype language and just be useful." },
      { type: "persona", speaker: "Devon Park", text: "Commit to a lane. Either 'we're fun and cheap, deal with it' or say something real about quality. The middle ground reads as empty." },
      { type: "persona", speaker: "Zoe Chen", text: "Honestly? Feature real customers. Not influencers, not models — actual people in their SHEIN Halloween fits showing it held up. That would be different. That would get me to stop scrolling." },
      { type: "persona", speaker: "Marcus Webb", text: "For me it would need to be structural, not cosmetic. Like — disclose the sourcing, show the labor conditions, donate a percentage of Halloween sales to a textile recycling program. That's the only version of this I'd respect. I know that's not what anyone wants to hear but you asked." },
    ];

    const MOCK_DISSENT = [
      { type: "persona", speaker: "Marcus Webb", text: "Actually I want to go back to something. Priya said 'not every purchase needs to be a political statement' — but that framing only works if you have the luxury of opting out of the politics. The garment workers making these don't get that option." },
